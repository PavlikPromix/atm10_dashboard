services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atm10_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-atm10}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atm10_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atm10} -d ${POSTGRES_DB:-atm10_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-atm10}:${POSTGRES_PASSWORD:-atm10_change_me}@postgres:5432/${POSTGRES_DB:-atm10_dashboard}
      HOST: 0.0.0.0
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      DEVICE_ID: ${DEVICE_ID:-atm10-main}
      DEVICE_NAME: ${DEVICE_NAME:-ATM10 Main}
      DEVICE_TOKEN: ${DEVICE_TOKEN:-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

  caddy:
    image: caddy:2-alpine
    profiles: ["https"]
    restart: unless-stopped
    depends_on:
      - web
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
